services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clinic
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d clinic"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - clinic_pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://clinic:clinic@db:5432/clinic
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  clinic_pgdata:
